<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>VideoSDK CDN Web Sample</title>
    <style>
    .video-canvas {
      background: rgba(0, 0, 0, 1);
      margin: 1px;
      border-radius: 10px;
      border: 1px solid rgba(0, 0, 0, 1);
    }
    .video-container {
      width: 48%;
      display: inline-block;
      vertical-align: top;
      aspect-ratio: 16 / 9;
    }
    .video-container video,
    .video-container canvas {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    </style>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
  </head>
  <body>
<div id="inputForms" class="input-forms" style="display:block;width:24%;height:100%;float:left;">
  <div class="mb-3" style="width:100%;">
    <label for="user_name" class="form-label">Display Name</label>
    <input type="text" class="form-control" id="user_name" placeholder="Input Display Name here" value="videosdk-user-01" required>
  </div>
  <div class="mb-3" style="width:100%;">
    <label for="session_topic" class="form-label">Session Name</label>
    <input type="text" class="form-control" id="session_topic" placeholder="Session Topic" value="vsdkmeeting" required>
  </div>
  <div class="mb-3" style="width:100%;">
    <label for="session_pwd" class="form-label">Session Password</label>
    <input type="text" class="form-control" id="session_pwd" placeholder="Session Password" value="123456">
  </div>
  <div class="mb-3">
    <label class="form-label">Role</label>
    <div id="join-role" class="btn-group w-100" role="group">
      <input type="radio" class="btn-check" name="joinRole" id="role-participant" value="0" checked>
      <label class="btn btn-outline-secondary" for="role-participant">0: Participant</label>
      <input type="radio" class="btn-check" name="joinRole" id="role-host" value="1">
      <label class="btn btn-outline-danger" for="role-host">1: Host</label>
    </div>
  </div>
  <p>
    <button type="button" class="btn btn-primary" id="join-button">Join(Start) the Session</button>
    <button type="button" class="btn btn-secondary" id="leave-button">Leave(End) the Session</button>
  </p>
  <p>
    <button type="button" class="btn btn-warning" id="rtms-start-button" disabled>Start RTMS</button>
    <button type="button" class="btn btn-dark" id="rtms-stop-button" disabled>Stop RTMS</button>
  </p>
  <p id="rtms-status" style="font-size:0.9em;color:#555;"></p>
</div>
<div id="buttons-and-canvas" class="main" style="display:block;width:74%;height:100%;overflow:scroll;float:right;">
<p>Self Video:</p>
<div class="video-container">
  <video id="self-video-videotag" class="video-canvas" width="1280" height="720"></video>
</div>
<p>Far Video:</p>
<div class="video-container">
  <canvas id="far-video-canvas" class="video-canvas" width="1280" height="720"></canvas>
</div>
</div>

  <script src="https://source.zoom.us/videosdk/zoom-video-2.3.15.min.js"></script>
  <script src="./js/index.js"></script>

</body>
</html>
